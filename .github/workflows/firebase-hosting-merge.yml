name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  test_and_lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install root deps
        run: npm ci
      - name: Timeline unit tests
        run: npm run -s test:timeline
      - name: Install functions deps
        run: npm --prefix functions ci
      - name: Functions lint
        run: npm --prefix functions run lint

  deploy_backend:
    runs-on: ubuntu-latest
    needs: test_and_lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install root deps
        run: npm ci
      - name: Install functions deps
        run: npm --prefix functions ci
      - name: Write Firebase service account
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_MPA_JUDGE_V2 }}' > ${{ github.workspace }}/gcp-key.json
      - name: Deploy backend surfaces
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-key.json
        run: npx firebase-tools deploy --project mpa-judge-v2 --non-interactive --only functions,firestore:rules,firestore:indexes,storage

  deploy_hosting:
    runs-on: ubuntu-latest
    needs: deploy_backend
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MPA_JUDGE_V2 }}
          channelId: live
          projectId: mpa-judge-v2

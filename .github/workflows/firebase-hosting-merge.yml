name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: read
jobs:
  test_and_lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json
      - name: Install root deps
        run: npm ci
      - name: Unit tests
        run: npm run -s test:unit
      - name: Install functions deps
        run: npm --prefix functions ci
      - name: Functions lint
        run: npm --prefix functions run lint

  security_tests:
    runs-on: ubuntu-latest
    needs: test_and_lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json
      - name: Install root deps
        run: npm ci
      - name: Install functions deps
        run: npm --prefix functions ci
      - name: Security tests
        run: npm run -s test:security

  deploy_live:
    runs-on: ubuntu-latest
    needs: [test_and_lint, security_tests]
    env:
      FIREBASE_SERVICE_ACCOUNT_MPA_JUDGE_V2: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MPA_JUDGE_V2 }}
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        if: github.ref == 'refs/heads/main' && env.FIREBASE_SERVICE_ACCOUNT_MPA_JUDGE_V2 != ''
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MPA_JUDGE_V2 }}
          channelId: live
          projectId: mpa-judge-v2
